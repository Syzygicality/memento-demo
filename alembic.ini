# Alembic owns ALL schema DDL, including the balance-check constraint trigger.
# The application never issues DDL at runtime. See DECISIONS.md
# "Alembic owns all DDL including the balance trigger".
[alembic]
script_location = migrations
prepend_sys_path = backend
sqlalchemy.url = driver://user:pass@localhost/dbname  ; overridden in migrations/env.py from settings

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
